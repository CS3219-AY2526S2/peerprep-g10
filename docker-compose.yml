services:
  question-db:
    image: postgres:17
    container_name: question-db
    environment:
      POSTGRES_DB: question_service
      POSTGRES_USER: peerprep
      POSTGRES_PASSWORD: peerprep_dev
    ports:
      - "5433:5432"
    volumes:
      - question-db-data:/var/lib/postgresql/data

  user-db:
    image: postgres:17
    container_name: user-db
    environment:
      POSTGRES_DB: user_service
      POSTGRES_USER: peerprep
      POSTGRES_PASSWORD: peerprep_dev
    ports:
      - "5434:5432"
    volumes:
      - user-db-data:/var/lib/postgresql/data
      - ./user-service/src/database:/docker-entrypoint-initdb.d

  collaboration-db:
    image: postgres:15
    container_name: collaboration-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: peerprep
    ports:
      - "5435:5432"
    volumes:
      - collaboration_db_data:/var/lib/postgresql/data
      - ./collaboration-service/src/database:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d peerprep"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: matching-redis
    ports:
      - "6379:6379"

  collaboration-backend:
    build:
      context: ./collaboration-service
      dockerfile: Dockerfile
    container_name: collaboration-backend
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgres://postgres:admin123@collaboration-db:5432/peerprep
    depends_on:
      collaboration-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3001/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  collaboration-frontend:
    build:
      context: ./peerprep-frontend
      dockerfile: Dockerfile
    container_name: collaboration-frontend
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      NEXT_PUBLIC_COLLAB_BACKEND_URL: http://collaboration-backend:3001
    depends_on:
      collaboration-backend:
        condition: service_healthy

volumes:
  question-db-data:
  user-db-data:
  collaboration_db_data:
