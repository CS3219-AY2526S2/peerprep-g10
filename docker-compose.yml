services:
  postgres:
    image: postgres:17
    container_name: peerprep-postgres
    environment:
      POSTGRES_DB: peerprep
      POSTGRES_USER: peerprep
      POSTGRES_PASSWORD: peerprep_dev
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
