services:
  question-db:
    image: postgres:17
    container_name: question-db
    environment:
      POSTGRES_DB: question_service
      POSTGRES_USER: peerprep
      POSTGRES_PASSWORD: peerprep_dev
    ports:
      - "5433:5432"
    volumes:
      - question-db-data:/var/lib/postgresql/data

  user-db:
    image: postgres:17
    container_name: user-db
    environment:
      POSTGRES_DB: user_service
      POSTGRES_USER: peerprep
      POSTGRES_PASSWORD: peerprep_dev
    ports:
      - "5434:5432"
    volumes:
      - user-db-data:/var/lib/postgresql/data
      - ./user-service/src/database:/docker-entrypoint-initdb.d

  collaboration-db:
    image: postgres:15
    container_name: collaboration-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: peerprep
    ports:
      - "5435:5432"
    volumes:
      - collaboration-db-data:/var/lib/postgresql/data
      - ./collaboration-service/src/database:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d peerprep"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: matching-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  matching-service:
    build:
      context: ./matching-service
    container_name: matching-service
    env_file:
      - ./matching-service/.env.example
    environment:
      REDIS_URL: redis://matching-redis:6379
      QUESTION_SERVICE_URL: http://question-service:3003
      COLLAB_SERVICE_URL: http://collaboration-service:3001
      # FRONTEND_URL: http://peerprep-frontend:3000
    ports:
      - "3002:3002"
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  question-service:
    build:
      context: ./question-service
    container_name: question-service
    env_file:
      - ./question-service/.env
    environment:
      DATABASE_URL: postgresql://peerprep:peerprep_dev@question-db:5432/question_service
    ports:
      - "3003:3003"
    depends_on:
      - question-db
    restart: unless-stopped

  collaboration-service:
    build:
      context: ./collaboration-service
      dockerfile: Dockerfile
    container_name: collaboration-service
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgres://postgres:admin123@collaboration-db:5432/peerprep
      QUESTION_SERVICE_URL: http://question-service:3003
    depends_on:
      collaboration-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3001/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./peerprep-frontend
      dockerfile: Dockerfile
    container_name: peerprep-frontend
    ports:
    - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      NEXT_PUBLIC_COLLAB_BACKEND_URL: /api/collab
      NEXT_PUBLIC_MATCHING_SERVICE_URL: /api/matching
      NEXT_PUBLIC_USER_SERVICE_URL: /api/user
    depends_on:
      collaboration-service:
        condition: service_healthy
      matching-service:
        condition: service_started
      user-service:
        condition: service_started
  
  user-service:
    build:
      context: ./user-service
    container_name: user-service
    env_file:
      - ./user-service/.env
    environment:
      DATABASE_URL: postgresql://peerprep:peerprep_dev@user-db:5432/user_service
    ports:
      - "3004:3004"
    depends_on:
      - user-db
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: peerprep-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      frontend:
        condition: service_started
      collaboration-service:
        condition: service_healthy
      matching-service:
        condition: service_started
      user-service:
        condition: service_started

volumes:
  question-db-data:
  user-db-data:
  collaboration-db-data:
